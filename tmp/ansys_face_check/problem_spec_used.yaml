    notes:
    - Use the reduced plate constants only for analytical reduced-order derivations.
    - Use the full 3D constitutive data for the coupled FEM dataset.
    - Keep the same constitutive convention and axis ordering across all samples.
mechanics:
  structure_type: finite_repeated_plate
  boundary_condition: clamped_free_free_free
  clamped_edge: x_min
  base_excitation:
    type: harmonic_support_acceleration
    amplitude_m_per_s2: 2.5
    direction: z
    interpretation: moving_clamped_base
    time_domain_form: a_base(t) = 2.5 * sin(omega * t)
    implementation_options:
    - impose_support_motion_at_clamped_edge
    - equivalent_inertial_loading_in_relative_coordinates
  damping:
    method: modal_superposition
    modal_damping_ratio: 0.025
electrical:
  measured_quantity: voltage
  measured_form: magnitude
  electrode_measurement_region: full_plate_electrode
  external_load_resistance_ohm: 10000.0
frf:
  target_mode: fundamental
  conditioning:
    include_f_peak_hz: true
  frequency_axis:
    type: normalized_with_peak_scalar
    normalized_range:
    - 0.9
    - 1.1
    recommended_num_points: 256
    store_absolute_frequency_axis: true
